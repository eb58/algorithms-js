<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mandelbrot Set Viewer</title>
    <style>
      body {
        margin: 0;
        padding: 20px;
        font-family: Arial, sans-serif;
        background: #1a1a1a;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      h1 {
        margin: 0 0 20px 0;
        font-size: 24px;
      }
      #controls {
        margin-bottom: 15px;
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        justify-content: center;
      }
      button {
        padding: 10px 20px;
        background: #4a90e2;
        border: none;
        border-radius: 5px;
        color: white;
        cursor: pointer;
        font-size: 14px;
      }
      button:hover {
        background: #357abd;
      }
      button:disabled {
        background: #666;
        cursor: not-allowed;
      }
      #canvasContainer {
        position: relative;
        border: 2px solid #333;
        cursor: crosshair;
      }
      canvas {
        display: block;
      }
      #info {
        margin-top: 15px;
        font-size: 14px;
        color: #aaa;
        text-align: center;
      }
      #progress {
        margin-top: 10px;
        width: 800px;
        height: 4px;
        background: #333;
        border-radius: 2px;
        overflow: hidden;
        display: none;
      }
      #progressBar {
        height: 100%;
        background: #4a90e2;
        width: 0%;
        transition: width 0.1s;
      }
    </style>
  </head>
  <body>
    <h1>Mandelbrot Set Viewer</h1>
    <div id="controls">
      <button onclick="resetView()" id="resetBtn">Zurücksetzen</button>
      <button onclick="increaseIterations()" id="moreBtn">Mehr Details (+50 Iterationen)</button>
      <button onclick="decreaseIterations()" id="lessBtn">Weniger Details (-50 Iterationen)</button>
    </div>
    <div id="canvasContainer">
      <canvas id="canvas" width="800" height="800"></canvas>
    </div>
    <div id="progress">
      <div id="progressBar"></div>
    </div>
    <div id="info">
      Klicke zum Hineinzoomen | Rechtsklick zum Herauszoomen<br />
      Zoom: <span id="zoomLevel">1.0</span>x | Iterationen: <span id="iterations">100</span>
    </div>

    <script>
      const timer = (start = performance.now()) => ({ elapsedTime: () => ((performance.now() - start) / 1000).toFixed(3) })

      const canvas = document.getElementById('canvas')
      const ctx = canvas.getContext('2d')
      const progressBar = document.getElementById('progressBar')
      const progressContainer = document.getElementById('progress')

      let isRendering = false
      let cancelRender = false

      // Mandelbrot-Ansichtsparameter
      let view = {
        zoom: 1,
        centerX: -0.5,
        centerY: 0,
        width: 3.5,
        maxIterations: 100
      }

      // Farbe für einen Punkt berechnen
      const getColor = (iteration, maxIterations) => {
        if (iteration >= maxIterations) return [0, 0, 0, 255]

        const ratio = iteration / maxIterations
        const hue = ratio * 360
        const saturation = 100
        const lightness = ratio < 0.5 ? 50 * ratio * 2 : 50

        const h = hue / 60
        const c = ((1 - Math.abs((2 * lightness) / 100 - 1)) * saturation) / 100
        const x = c * (1 - Math.abs((h % 2) - 1))
        const m = lightness / 100 - c / 2

        let r, g, b
        if (h < 1) {
          r = c
          g = x
          b = 0
        } else if (h < 2) {
          r = x
          g = c
          b = 0
        } else if (h < 3) {
          r = 0
          g = c
          b = x
        } else if (h < 4) {
          r = 0
          g = x
          b = c
        } else if (h < 5) {
          r = x
          g = 0
          b = c
        } else {
          r = c
          g = 0
          b = x
        }
        return [Math.round((r + m) * 255), Math.round((g + m) * 255), Math.round((b + m) * 255), 255]
      }

      // Mandelbrot-Iteration für einen Punkt
      function mandelbrot(cx, cy, maxIterations = 100) {
        let x = cx
        let y = cy
        let n = 0

        while (x * x + y * y <= 4 && n++ < maxIterations) {
          const xTemp = x * x - y * y + cx
          y = 2 * x * y + cy
          x = xTemp
        }
        return getColor(n, maxIterations)
      }

      // Progressives Rendering in Chunks
      async function drawMandelbrot() {
        if (isRendering) {
          cancelRender = true
          await new Promise((resolve) => setTimeout(resolve, 100))
        }

        isRendering = true
        cancelRender = false

        const width = canvas.width
        const height = canvas.height

        const t = timer()
        const imageData = ctx.createImageData(width, height)
        const viewHeight = view.width * (height / width)

        const chunkSize = 50 // Zeilen pro Chunk
        let currentY = 0

        while (currentY < height && !cancelRender) {
          const endY = Math.min(currentY + chunkSize, height)
          for (let py = currentY; py < endY; py++) {
            for (let px = 0; px < width; px++) {
              const x0 = view.centerX + (px - width / 2) * (view.width / width)
              const y0 = view.centerY + (py - height / 2) * (viewHeight / height)
              mandelbrot(x0, y0, view.maxIterations).forEach((n, idx) => (imageData.data[(py * width + px) * 4 + idx] = n))
            }
          }}

          ctx.putImageData(imageData, 0, 0)
          console.log(t.elapsedTime())

          currentY = endY
          const progress = (currentY / height) * 100
          progressBar.style.width = progress + '%'

          // Kurze Pause für UI-Updates
          await new Promise((resolve) => setTimeout(resolve, 0))
        }

        if (!cancelRender) {
          progressContainer.style.display = 'none'
          updateInfo()
        }
        isRendering = false
      }

      // Zoom-Funktion
      function zoom(clientX, clientY, zoomFactor = 0.5) {
        if (isRendering) return
        const rect = canvas.getBoundingClientRect()
        const x = clientX - rect.left
        const y = clientY - rect.top
        const viewHeight = view.width * (canvas.height / canvas.width)
        const clickX = view.centerX + (x - canvas.width / 2) * (view.width / canvas.width)
        const clickY = view.centerY + (y - canvas.height / 2) * (viewHeight / canvas.height)
        view.width *= zoomFactor
        view.centerX = clickX
        view.centerY = clickY
        drawMandelbrot()
      }

      // Event-Listener
      canvas.addEventListener('click', (e) => zoom(e.clientX, e.clientY, 0.5))
      canvas.addEventListener('contextmenu', (e) => {
        e.preventDefault()
        zoom(e.clientX, e.clientY, 2)
      })

      // Steuerungs-Funktionen
      function resetView() {
        if (isRendering) return
        view.centerX = -0.5
        view.centerY = 0
        view.width = 3.5
        drawMandelbrot()
      }

      function increaseIterations() {
        if (isRendering) return
        view.maxIterations += 50
        drawMandelbrot()
      }

      function decreaseIterations() {
        if (isRendering) return
        view.maxIterations = Math.max(50, view.maxIterations - 50)
        drawMandelbrot()
      }

      function updateInfo() {
        document.getElementById('zoomLevel').textContent = (3.5 / view.width).toFixed(2)
        document.getElementById('iterations').textContent = view.maxIterations
      }

      // Initialisierung
      drawMandelbrot()
    </script>
  </body>
</html>
